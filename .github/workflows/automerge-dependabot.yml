name: Automerge Dependabot PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: iobroker-bot-orga/action-automerge-dependabot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
